name: Bug report
description: Something in Verum behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Verum is in early development — there is no released build yet. Please
        report bugs against a source checkout and include the commit SHA.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA
      placeholder: ef119ad
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.1"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Traceback / logs
      render: shell
