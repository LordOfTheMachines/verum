version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - "area:build"

# NOTE: the `pip` ecosystem is deliberately absent. Dependabot bumps the
# constraints in pyproject.toml but does not regenerate uv.lock, and CI syncs
# with `uv sync --locked` — so every such PR would fail until someone re-locked
# by hand. Python dependencies are refreshed manually instead:
#
#     uv lock --upgrade && uv sync && uv run pytest
#
# Revisit once Phase 1 adds real runtime dependencies (PyQt6, PyMuPDF), where
# security updates matter more than they do for a dev-tool-only dependency set.
