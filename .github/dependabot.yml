version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - "area:build"

  # uv lockfiles are supported through the pip ecosystem, which reads
  # pyproject.toml and uv.lock.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    labels:
      - "area:build"
    groups:
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
